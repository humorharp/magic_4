<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Four · Four is the Magic Number</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #06060e;
    --surface: #0b0b18;
    --border:  #1c1c30;
    --gold:    #c9a84c;
    --gold-hi: #f0cc70;
    --gold-lo: #7a6030;
    --text:    #ddd4bc;
    --muted:   #6a6250;
    --dim:     #2e2c24;
    --green:   #4ecb8d;
    --red:     #e06060;
    --glow:    0 0 18px rgba(201,168,76,0.35), 0 0 60px rgba(201,168,76,0.12);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 4rem;
    overflow-x: hidden;
  }

  .ghost-four {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .ghost-four span {
    font-family: 'Cinzel', serif;
    font-size: clamp(60vw, 80vw, 90vh);
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 1px rgba(201,168,76,0.045);
    user-select: none; line-height: 1;
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.015); }
  }

  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 100;
  }
  body::before {
    content: ''; position: fixed; inset: -50%; width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4; pointer-events: none; z-index: 0;
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 640px;
    display: flex; flex-direction: column;
    gap: 2rem;
    margin-top: auto; margin-bottom: auto;
  }

  header { text-align: center; }
  .eyebrow {
    font-size: 0.62rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--gold-lo);
    margin-bottom: 1rem;
  }
  .eyebrow a { color: inherit; text-decoration: none; transition: color 0.2s; }
  .eyebrow a:hover { color: var(--gold); }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700; letter-spacing: 0.05em;
    color: var(--text); line-height: 1.15;
    text-shadow: var(--glow); margin-bottom: 0.6rem;
  }
  h1 em { font-style: normal; color: var(--gold); }
  .date-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.2em; text-transform: uppercase;
  }

  .rule { border: none; border-top: 1px solid var(--border); margin: 0; }

  /* status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
  }
  .progress {
    font-size: 0.62rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold-lo);
  }
  .lives {
    display: flex; gap: 0.5rem; font-size: 1.35rem;
  }
  .heart { transition: opacity 0.35s, transform 0.35s; }
  .heart.lost { opacity: 0.15; transform: scale(0.72); }

  /* tiles area */
  .tiles-area {
    display: flex; flex-direction: column;
    align-items: center; gap: 1rem;
    padding: 1.5rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative; overflow: hidden;
  }
  .tiles-area::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .word-prompt {
    font-size: 0.62rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--muted);
    position: relative; z-index: 1;
  }
  .tiles {
    display: flex; gap: 0.4rem;
    flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1;
  }
  .tile {
    width: clamp(30px, 8.5vw, 44px);
    height: clamp(36px, 10vw, 52px);
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 2vw, 1rem);
    font-weight: 700;
    color: var(--text); text-transform: uppercase;
  }
  .tile.do-flip { animation: tileFlip 0.42s ease forwards; }
  @keyframes tileFlip {
    0%   { transform: scaleY(1);    background: var(--surface);         border-color: var(--border); color: var(--text); }
    44%  { transform: scaleY(0.04); background: var(--surface);         border-color: var(--border); color: var(--text); }
    56%  { transform: scaleY(0.04); background: rgba(78,203,141,0.28);  border-color: var(--green);  color: var(--green); }
    100% { transform: scaleY(1);    background: rgba(78,203,141,0.28);  border-color: var(--green);  color: var(--green); }
  }
  .tile.green {
    background: rgba(78,203,141,0.28);
    border-color: var(--green); color: var(--green);
  }
  .tile.flash-red { animation: flashRed 0.45s ease forwards; }
  @keyframes flashRed {
    0%   { background: var(--surface); border-color: var(--border); }
    35%  { background: rgba(224,96,96,0.28); border-color: var(--red); }
    100% { background: var(--surface); border-color: var(--border); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15%     { transform: translateX(-7px); }
    35%     { transform: translateX(7px); }
    55%     { transform: translateX(-5px); }
    75%     { transform: translateX(5px); }
    90%     { transform: translateX(-2px); }
  }
  .tiles.shaking { animation: shake 0.45s ease; }

  /* input */
  .input-panel { display: flex; flex-direction: column; gap: 0.5rem; }
  .input-label {
    font-size: 0.65rem; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--gold-lo);
  }
  .input-row {
    display: flex;
    border: 1px solid var(--border); background: var(--surface);
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .input-row:focus-within {
    border-color: var(--gold-lo);
    box-shadow: 0 0 0 1px var(--gold-lo), inset 0 0 20px rgba(201,168,76,0.04);
  }
  .guess-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    padding: 0.9rem 1.1rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.15rem; color: var(--text);
    caret-color: var(--gold);
    -moz-appearance: textfield;
  }
  .guess-input::-webkit-inner-spin-button,
  .guess-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .guess-input::placeholder { color: var(--dim); font-style: italic; }
  .guess-input:disabled { opacity: 0.5; }
  .go-btn {
    padding: 0.9rem 1.4rem;
    background: transparent; border: none;
    border-left: 1px solid var(--border);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem; letter-spacing: 0.25em;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }
  .go-btn:hover { background: rgba(201,168,76,0.08); color: var(--gold-hi); }
  .go-btn:active { background: rgba(201,168,76,0.15); }
  .go-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .input-note { font-size: 0.62rem; color: var(--dim); letter-spacing: 0.05em; }

  /* feedback */
  .feedback {
    text-align: center; font-size: 0.78rem;
    min-height: 1.2em; letter-spacing: 0.05em;
  }
  .feedback.wrong { color: var(--red); }
  .feedback.info  { color: var(--muted); font-style: italic; }

  /* end screen */
  .end-screen {
    display: none; flex-direction: column;
    align-items: center; gap: 1.5rem;
    text-align: center;
    padding: 2rem 1.5rem;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative; overflow: hidden;
  }
  .end-screen::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .end-screen.show { display: flex; }

  .end-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
  }
  .end-title.win  { color: var(--gold); text-shadow: var(--glow); }
  .end-title.lose { color: var(--red); }

  .end-sub {
    font-size: 0.72rem; color: var(--muted);
    letter-spacing: 0.1em; line-height: 1.8;
  }

  .share-grid {
    font-size: 1.6rem; letter-spacing: 0.12em;
    line-height: 1.5; font-family: sans-serif;
  }

  .copy-btn {
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid var(--gold-lo);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem; letter-spacing: 0.25em;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .copy-btn:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); color: var(--gold-hi); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .reveal-chain {
    font-size: 0.7rem; color: var(--muted);
    line-height: 2.2; font-style: italic;
    word-break: break-word;
  }
  .reveal-chain .w   { color: var(--text); font-style: normal; font-weight: 700; }
  .reveal-chain .c   { color: var(--gold-hi); font-style: normal; }
  .reveal-chain .cf  { color: var(--gold); font-style: normal; font-weight: 700;
                        font-size: 0.9rem; text-shadow: var(--glow); }
  .reveal-chain .arr { color: var(--dim); }

  footer {
    text-align: center; font-size: 0.6rem;
    color: var(--dim); letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<div class="ghost-four" aria-hidden="true"><span>4</span></div>

<div class="wrap">

  <header>
    <p class="eyebrow"><a href="/">← four is the magic number</a></p>
    <h1>Daily <em>Four</em></h1>
    <p class="date-label" id="dateLabel">—</p>
  </header>

  <hr class="rule" />

  <div id="gameArea">
    <div style="display:flex;flex-direction:column;gap:1.5rem">

      <div class="status-bar">
        <div class="progress" id="progressLabel">Step 1 of ?</div>
        <div class="lives" id="livesDisplay"></div>
      </div>

      <div class="tiles-area">
        <span class="word-prompt">How many letters are in this word?</span>
        <div class="tiles" id="tilesRow"></div>
      </div>

      <div class="input-panel">
        <span class="input-label">Your Answer</span>
        <div class="input-row">
          <input
            type="number" id="guessInput" class="guess-input"
            placeholder="count the letters…"
            min="1" max="99" autocomplete="off"
          />
          <button class="go-btn" id="submitBtn" onclick="submitGuess()">Guess</button>
        </div>
        <span class="input-note">Enter the number of letters in the word above</span>
      </div>

      <div class="feedback" id="feedback">&nbsp;</div>

    </div>
  </div>

  <div class="end-screen" id="endScreen">
    <div class="end-title" id="endTitle"></div>
    <div class="end-sub" id="endSub"></div>
    <div class="share-grid" id="shareGrid"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy Result</button>
    <div class="reveal-chain" id="revealChain"></div>
  </div>

  <hr class="rule" />
  <footer>christopherjharper.com &mdash; a harmless obsession</footer>

</div>

<script>
/* ── num → words ── */
const ONEs = ['zero','one','two','three','four','five','six','seven','eight','nine',
  'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const TENs = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];

function numToWords(n) {
  if (n < 0)   return 'negative ' + numToWords(-n);
  if (n === 0) return 'zero';
  if (n < 20)  return ONEs[n];
  if (n < 100) { const t=TENs[Math.floor(n/10)],o=n%10; return o ? t+'-'+ONEs[o] : t; }
  if (n < 1000){ const h=Math.floor(n/100),r=n%100; return ONEs[h]+' hundred'+(r?' '+numToWords(r):''); }
  return n.toString();
}

function letterCount(w) { return w.replace(/[^a-z]/gi,'').length; }

function buildChain(n) {
  const steps=[], seen=new Set();
  let cur=n;
  while (true) {
    if (seen.has(cur) || steps.length > 30) break;
    seen.add(cur);
    const word = numToWords(cur);
    const cnt  = letterCount(word);
    steps.push({ num:cur, word, count:cnt });
    if (cnt === 4) break;
    cur = cnt;
  }
  return steps;
}

/* ── daily seed ── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function hashStr(s) {
  let h = 2166136261;
  for (let i=0; i<s.length; i++) { h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return h;
}

function getDailyNumber() {
  const seed = hashStr(todayStr());
  const pool = [];
  for (let n=5; n<=99; n++) {
    const ch = buildChain(n);
    if (ch.length >= 2) pool.push(n);
  }
  return pool[seed % pool.length];
}

/* ── state ── */
const STORAGE_KEY = 'daily_four_' + todayStr();
let chain=[], currentStep=0, lives=3;
let stepCorrect=[], stepWrong=[], locked=false, shareText='';

/* ── init ── */
function init() {
  document.getElementById('dateLabel').textContent = todayStr();
  chain = buildChain(getDailyNumber());
  stepCorrect = new Array(chain.length).fill(false);
  stepWrong   = new Array(chain.length).fill(false);

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (Array.isArray(s.stepCorrect) && s.stepCorrect.length === chain.length) {
        stepCorrect = s.stepCorrect;
        stepWrong   = s.stepWrong || stepWrong;
        lives       = typeof s.lives === 'number' ? s.lives : 0;
        document.getElementById('gameArea').style.display = 'none';
        finalizeEnd(s.won);
        return;
      }
    } catch(e) {}
  }
  renderStep();
}

/* ── render ── */
function renderStep() {
  const step = chain[currentStep];
  renderLives();
  document.getElementById('progressLabel').textContent = `Step ${currentStep+1} of ${chain.length}`;
  renderTiles(step.word, false);
  const input = document.getElementById('guessInput');
  input.value = '';
  input.disabled = false;
  document.getElementById('submitBtn').disabled = false;
  setFeedback('', '');
  input.focus();
}

function renderLives() {
  const el = document.getElementById('livesDisplay');
  el.innerHTML = '';
  for (let i=0; i<3; i++) {
    const s = document.createElement('span');
    s.className = 'heart' + (i >= lives ? ' lost' : '');
    s.textContent = '♥';
    el.appendChild(s);
  }
}

function renderTiles(word, green) {
  const el = document.getElementById('tilesRow');
  el.className = 'tiles';
  el.innerHTML = '';
  word.replace(/[^a-z]/gi,'').split('').forEach(ch => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (green ? ' green' : '');
    tile.textContent = ch;
    el.appendChild(tile);
  });
}

/* ── submit ── */
function submitGuess() {
  if (locked) return;
  const input = document.getElementById('guessInput');
  const val = parseInt(input.value.trim(), 10);
  if (isNaN(val) || val < 1) { setFeedback('Enter a number', 'info'); return; }

  const step = chain[currentStep];
  if (val === step.count) {
    locked = true;
    stepCorrect[currentStep] = true;
    input.disabled = true;
    document.getElementById('submitBtn').disabled = true;
    setFeedback('', '');
    flipTilesGreen(() => {
      currentStep++;
      locked = false;
      if (currentStep >= chain.length) endGame(true);
      else renderStep();
    });
  } else {
    lives--;
    stepWrong[currentStep] = true;
    renderLives();
    shakeAndFlash();
    if (lives <= 0) {
      locked = true;
      input.disabled = true;
      document.getElementById('submitBtn').disabled = true;
      setTimeout(() => endGame(false), 700);
    } else {
      setFeedback(`Not quite — ${lives} ${lives===1?'life':'lives'} remaining`, 'wrong');
      input.value = '';
      input.focus();
    }
  }
}

function setFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg || '\u00a0';
  el.className = 'feedback' + (type ? ' '+type : '');
}

/* ── animations ── */
function flipTilesGreen(onDone) {
  const tiles = document.querySelectorAll('#tilesRow .tile');
  const delay = 75;
  tiles.forEach((t,i) => setTimeout(() => t.classList.add('do-flip'), i*delay));
  setTimeout(() => {
    tiles.forEach(t => { t.classList.remove('do-flip'); t.classList.add('green'); });
    onDone();
  }, tiles.length*delay + 440);
}

function shakeAndFlash() {
  const row = document.getElementById('tilesRow');
  row.classList.remove('shaking');
  void row.offsetWidth;
  row.classList.add('shaking');
  row.querySelectorAll('.tile').forEach(t => {
    t.classList.add('flash-red');
    setTimeout(() => t.classList.remove('flash-red'), 450);
  });
  setTimeout(() => row.classList.remove('shaking'), 500);
}

/* ── end game ── */
function endGame(won) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ won, stepCorrect, stepWrong, lives }));
  document.getElementById('gameArea').style.display = 'none';
  finalizeEnd(won);
}

function finalizeEnd(won) {
  document.getElementById('endScreen').classList.add('show');

  const title = document.getElementById('endTitle');
  title.textContent = won ? 'You got it!' : 'Better luck tomorrow';
  title.className = 'end-title ' + (won ? 'win' : 'lose');

  const sub = document.getElementById('endSub');
  if (won) {
    sub.innerHTML = `Solved in <strong style="color:var(--text)">${chain.length}</strong> step${chain.length!==1?'s':''} &middot; <strong style="color:var(--text)">${lives}</strong> ${lives===1?'life':'lives'} remaining`;
  } else {
    sub.textContent = 'Out of lives · Here\'s the full chain:';
  }

  const emojis = chain.map((_,i) =>
    stepCorrect[i] ? '🟩' : stepWrong[i] ? '🟥' : '⬛'
  );
  document.getElementById('shareGrid').textContent = emojis.join('');

  const tokens = [];
  chain.forEach((s,i) => {
    const last = i === chain.length-1;
    tokens.push(`<span class="w">${s.word}</span>`);
    tokens.push(`<span class="${last?'cf':'c'}">${s.count}</span>`);
  });
  document.getElementById('revealChain').innerHTML =
    tokens.join('<span class="arr"> → </span>');

  const ds = todayStr();
  shareText = `Daily Four — ${ds}\n${won ? `✓ ${chain.length} step${chain.length!==1?'s':''}` : '✗ out of lives'}\n${emojis.join('')}\nmagic-4.vercel.app/daily`;
}

function copyResult() {
  const btn = document.getElementById('copyBtn');
  const finish = () => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Result'; btn.classList.remove('copied'); }, 2000);
  };
  navigator.clipboard ? navigator.clipboard.writeText(shareText).then(finish) : (() => {
    const ta = Object.assign(document.createElement('textarea'),
      { value: shareText, style: 'position:fixed;opacity:0' });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); finish();
  })();
}

document.getElementById('guessInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGuess();
});

init();
</script>
</body>
</html>
